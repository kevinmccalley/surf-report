name: Refresh surf spots

on:
  schedule:
    - cron: '0 0 * * 1'   # every Monday at 00:00 UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate surf-spots.json
        run: python3 scripts/generate-surf-spots.py

      - name: Commit updated spots if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/lib/surf-spots.json
          if git diff --cached --quiet; then
            echo "No changes to surf-spots.json — skipping commit"
          else
            NEW_COUNT=$(python3 -c "import json; d=json.load(open('app/lib/surf-spots.json')); print(len(d))")
            OLD_COUNT=$(git show HEAD:app/lib/surf-spots.json | python3 -c "import json,sys; print(len(json.load(sys.stdin)))" 2>/dev/null || echo 0)
            # Reject refresh if the new dataset is more than 20% smaller than the previous one
            # (Surfline may be blocking GitHub IPs — don't overwrite good data with degraded results)
            THRESHOLD=$(python3 -c "print(int(int('$OLD_COUNT') * 0.80))")
            if [ "$NEW_COUNT" -lt "$THRESHOLD" ]; then
              echo "WARNING: New spot count ($NEW_COUNT) is more than 20% below previous ($OLD_COUNT). Aborting to protect dataset."
              git restore app/lib/surf-spots.json
              exit 0
            fi
            git commit -m "chore: refresh surf spots dataset ($NEW_COUNT spots)"
            git push origin HEAD:master
            git push origin HEAD:dev
          fi
